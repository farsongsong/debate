<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('오류')}"></head>
<body class="auth-page">
<nav th:replace="~{fragments/header :: nav}"></nav>
<main class="auth-main">
  <div class="auth-card" style="text-align:center; padding: 3rem 2rem;">
    <div style="font-size: 4rem; margin-bottom: 1rem;">
      <span th:if="${errorCode == 404}">🔍</span>
      <span th:if="${errorCode == 403}">🚫</span>
      <span th:if="${errorCode == 500}">⚠️</span>
      <span th:unless="${errorCode == 404 or errorCode == 403 or errorCode == 500}">😕</span>
    </div>
    <h1 class="auth-title" th:text="${errorCode}">오류</h1>
    <p class="auth-subtitle" th:text="${errorMessage != null ? errorMessage : '오류가 발생했습니다.'}">오류 메시지</p>
    <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
      <a href="javascript:history.back()" class="btn-primary" style="text-decoration:none; padding: .6rem 1.4rem; border-radius: .5rem;">← 뒤로가기</a>
      <a href="/" class="btn-primary" style="text-decoration:none; padding: .6rem 1.4rem; border-radius: .5rem; background: #718096;">홈으로</a>
    </div>
  </div>
</main>
</body>
</html>
