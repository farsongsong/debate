<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('비밀번호 찾기')}"></head>
<body class="auth-page">
<nav th:replace="~{fragments/header :: nav}"></nav>
<main class="auth-main">
  <div class="auth-card">
    <h1 class="auth-title">비밀번호 찾기</h1>
    <p class="auth-subtitle">가입한 이메일로 임시 비밀번호를 발송합니다</p>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <form th:action="@{/auth/forgot-password}" method="post" class="auth-form">
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="가입한 이메일 주소" required>
      </div>
      <button type="submit" class="btn-primary btn-full">임시 비밀번호 발송</button>
    </form>
    <div class="auth-footer">
      <a href="/auth/login">← 로그인으로 돌아가기</a>
    </div>
  </div>
</main>
</body>
</html>
