<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('로그인')}"></head>
<body class="auth-page">
<nav th:replace="~{fragments/header :: nav}"></nav>
<main class="auth-main">
  <div class="auth-card">
    <h1 class="auth-title">로그인</h1>
    <p class="auth-subtitle">토론에 참여하세요</p>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <form th:action="@{/auth/login}" method="post" class="auth-form">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
      </div>
      <button type="submit" class="btn-primary btn-full">로그인</button>
    </form>
    <div class="auth-footer" style="flex-direction:column;gap:.5rem;">
      <div><span>계정이 없으신가요?</span> <a href="/auth/signup">회원가입</a></div>
      <div><a href="/auth/forgot-password" style="font-size:.85rem;color:#718096;">비밀번호를 잊으셨나요?</a></div>
    </div>
  </div>
</main>
</body>
</html>
