<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('이메일 인증')}"></head>
<body class="auth-page">
<nav th:replace="~{fragments/header :: nav}"></nav>
<main class="auth-main">
  <div class="auth-card" style="text-align:center; padding: 3rem 2rem;">
    <div th:if="${success}">
      <div style="font-size:3.5rem; margin-bottom:1rem;">✅</div>
      <h1 class="auth-title">인증 완료!</h1>
      <p class="auth-subtitle" th:text="${success}"></p>
      <a href="/auth/signup" class="btn-primary"
         style="display:inline-block;margin-top:1.5rem;text-decoration:none;padding:.7rem 1.8rem;border-radius:.5rem;">
        회원가입 계속하기
      </a>
    </div>
    <div th:if="${error}">
      <div style="font-size:3.5rem; margin-bottom:1rem;">❌</div>
      <h1 class="auth-title">인증 실패</h1>
      <p class="auth-subtitle" th:text="${error}"></p>
      <a href="/auth/signup" class="btn-primary"
         style="display:inline-block;margin-top:1.5rem;text-decoration:none;padding:.7rem 1.8rem;border-radius:.5rem;background:#e53e3e;">
        다시 시도하기
      </a>
    </div>
  </div>
</main>
</body>
</html>
